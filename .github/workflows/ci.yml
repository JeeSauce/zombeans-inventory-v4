name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      # Dummy values so env validation passes at build time; no real secrets in CI.
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run scan:bundle # scenario #23: no service-role key in client bundle

  database-and-browser:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      STEPUP_CODE_PEPPER: local-dev-stepup-pepper-change-me
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Start local Supabase
        run: npx supabase start
      - name: Export local-only Supabase credentials
        shell: bash
        run: |
          env_file="$RUNNER_TEMP/supabase.env"
          npx supabase status -o env > "$env_file"
          set -a
          source "$env_file"
          set +a
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_URL=$DB_URL" >> "$GITHUB_ENV"
      - run: npm run db:reset
      - run: npm run test:integration
      - run: npm run seed:dev
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
