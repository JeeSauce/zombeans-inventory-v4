# Supabase local development configuration.
# `supabase start` boots Postgres, Auth (GoTrue), Storage, and the API locally (needs Docker).
# Hosted staging/production use SEPARATE projects — see docs/SUPABASE_SETUP.md.

project_id = "zombeans-inventory"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false                 # accounts are created by Super Admin, not self-signup

[auth.email]
enable_signup = false
enable_confirmations = true
secure_password_change = true

[storage]
enabled = true
file_size_limit = "10MiB"
